name: CI - Lint and Syntax

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-check:
    name: Python ${{ matrix.python-version }} - lint and syntax
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install CPU-only PyTorch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --exclude=__pycache__,.venv,venv,env,fixes \
            --max-line-length=120 \
            --show-source \
            --statistics

      - name: Compile-check all Python files
        run: python tests/test_syntax.py

      - name: Run smoke tests
        run: pytest tests/ -v --tb=short
